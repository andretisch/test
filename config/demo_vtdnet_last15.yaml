source_video: data/last_15s.mp4
target_video: output/demo_last15_vtdnet.mp4
model_backend: vtdnet
model_path: models/vtdnet_640.onnx
# VTDNet даёт низкий objectness (~0.15–0.25); 0.25 отсекает почти всё
vtdnet_confidence: 0.03
confidence: 0.25
iou: 0.45
# ByteTrack: для VTDNet conf низкий (~0.1–0.2), порог активации трека тоже ниже
vtdnet_tracker:
  track_activation_threshold: 0.05
  minimum_matching_threshold: 0.5
  lost_track_buffer: 90
  frame_rate: 10
imgsz: 640
vehicle_class_ids: [0, 1, 2, 3]
line:
  start: [1262, 279]
  end: [12, 113]
labels:
  in: "к камере"
  out: "от камеры"
swap_directions: true
annotators:
  box_thickness: 4
  trace_length: 30
